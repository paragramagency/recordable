name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  commitlint:
    # Enforce Conventional Commits on every commit in a PR (see CONTRIBUTING.md).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the PR commit range is available

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint PR commit messages
        run: npx commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - run: npm run format:check
      - run: npm run lint
      # Type-checks the whole project incl. test/ (tsx only transpiles, so type
      # errors there slip past build/test).
      - run: npm run typecheck

      - run: npm test

      # Schema is generated from src/script.ts — fail if the committed copy is stale.
      - run: npm run gen:schema
      - name: Verify schema is up to date
        run: git diff --exit-code recordable.schema.json

      - run: npm run build

      # Smoke-test the CLI validator against a sample script (no browser).
      - run: node dist/cli.js demos/06-cli/demo.json --check
