name: Release

# Publish to npm when a version tag (v1.2.3) is pushed.
# Auth is GitHub OIDC trusted publishing — no NPM_TOKEN secret; provenance is automatic.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC token for npm trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm

      # Trusted publishing needs npm >= 11.5.1; setup-node still ships npm 10.
      - run: npm install -g npm@latest

      - run: npm ci

      # Guard: the tag (v1.2.3) must match package.json, or we publish the wrong version.
      - name: Check tag matches package version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag $TAG does not match package.json version $PKG"
            exit 1
          fi

      # prepublishOnly runs clean + gen:schema + build. --access public for the unscoped package.
      - run: npm publish --access public

  # Create a GitHub Release for the tag, with notes lifted from CHANGELOG.md.
  # Runs only after npm publish succeeds, so the Release never claims a version
  # that didn't ship.
  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@v4

      # Pull the body between this version's "## [x.y.z]" heading and the next
      # "## [" heading — so the Release notes mirror the CHANGELOG section exactly.
      - name: Extract changelog section
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" {f=1; next}
            f && /^## \[/ {exit}
            f {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::error::no CHANGELOG.md section found for $VERSION"
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md
