<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lumen — Newsletter</title>
    <style>
      :root {
        --bg: #0b1020;
        --card: #141a30;
        --accent: #6c63ff;
        --accent-hi: #837dff;
        --text: #eef1ff;
        --muted: #9aa3c7;
        --line: #232a45;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: radial-gradient(120% 120% at 50% 0%, #1a2142 0%, var(--bg) 55%);
        color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        width: 440px;
        max-width: 90vw;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      }
      .badge {
        display: inline-block;
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent-hi);
        background: rgba(108, 99, 255, 0.12);
        border: 1px solid rgba(108, 99, 255, 0.3);
        padding: 6px 12px;
        border-radius: 999px;
      }
      h1 { font-size: 30px; margin: 18px 0 8px; line-height: 1.15; }
      p.sub { color: var(--muted); margin: 0 0 28px; line-height: 1.5; }
      label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
      #email {
        width: 100%;
        padding: 14px 16px;
        font-size: 16px;
        color: var(--text);
        background: #0f1428;
        border: 1px solid var(--line);
        border-radius: 12px;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      #email:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.18); }
      button {
        margin-top: 18px;
        width: 100%;
        padding: 15px;
        font-size: 16px;
        font-weight: 600;
        color: #fff;
        background: var(--accent);
        border: 0;
        border-radius: 12px;
        cursor: pointer;
        transition: background 0.2s, transform 0.08s;
      }
      button:hover { background: var(--accent-hi); }
      button:active { transform: translateY(1px); }
      .done {
        display: none;
        margin-top: 22px;
        padding: 16px;
        border-radius: 12px;
        background: rgba(46, 204, 113, 0.12);
        border: 1px solid rgba(46, 204, 113, 0.35);
        color: #8ef0b8;
        font-size: 15px;
      }
      body.subscribed .done { display: block; }
      body.subscribed form { display: none; }
      footer { margin-top: 28px; font-size: 12px; color: var(--muted); }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="badge">Lumen Weekly</span>
      <h1>Design notes, every Friday.</h1>
      <p class="sub">One short email a week on interface craft, motion, and the tools we use. No spam.</p>

      <form id="signup" onsubmit="event.preventDefault(); document.body.classList.add('subscribed');">
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" placeholder="you@studio.com" autocomplete="off" />
        <button id="subscribe" type="submit">Subscribe</button>
      </form>

      <div class="done">✓ You're in. Check your inbox to confirm.</div>
      <footer>Join 12,400 designers and engineers.</footer>
    </main>
  </body>
</html>
