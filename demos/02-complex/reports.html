<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Beacon — Reports</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand"><span class="dot"></span> Beacon</div>
      <nav class="nav">
        <a href="index.html">📊 Dashboard</a>
        <a class="active" href="reports.html">📄 Reports</a>
        <a href="settings.html">⚙️ Settings</a>
      </nav>
    </aside>

    <div class="main">
      <header class="topbar">
        <input class="search" placeholder="Search reports…" autocomplete="off" />
        <div class="spacer"></div>
        <button class="btn" id="new-report">＋ New report</button>
      </header>

      <main class="content">
        <h1 class="page">Reports</h1>
        <p class="lead">Scheduled and one-off reports for your workspace.</p>

        <section class="panel">
          <table>
            <thead>
              <tr><th>Name</th><th>Type</th><th>Owner</th><th>Status</th></tr>
            </thead>
            <tbody id="rows">
              <tr><td>Q2 Acquisition</td><td>Funnel</td><td>Cam P.</td><td><span class="pill ready">Ready</span></td></tr>
              <tr><td>Weekly Retention</td><td>Cohort</td><td>Dana K.</td><td><span class="pill ready">Ready</span></td></tr>
              <tr><td>Campaign — Spring</td><td>Attribution</td><td>Cam P.</td><td><span class="pill draft">Draft</span></td></tr>
            </tbody>
          </table>
        </section>
      </main>
    </div>

    <!-- New report modal -->
    <div class="overlay" id="overlay">
      <div class="modal" role="dialog" aria-label="New report">
        <h2>New report</h2>
        <div class="field">
          <label for="r-title">Report name</label>
          <input class="text" id="r-title" placeholder="e.g. June Performance" autocomplete="off" />
        </div>
        <div class="field">
          <label for="r-type">Type</label>
          <select id="r-type">
            <option value="funnel">Funnel</option>
            <option value="cohort">Cohort</option>
            <option value="attribution">Attribution</option>
            <option value="retention">Retention</option>
          </select>
        </div>
        <div class="field">
          <label for="r-desc">Description</label>
          <textarea id="r-desc" placeholder="What should this report track?"></textarea>
        </div>
        <div class="row">
          <button class="btn ghost" id="cancel">Cancel</button>
          <button class="btn" id="create">Create report</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast">✓ Report created</div>

    <script>
      const overlay = document.getElementById("overlay");
      const open = () => overlay.classList.add("open");
      const close = () => overlay.classList.remove("open");

      document.getElementById("new-report").onclick = open;
      document.getElementById("cancel").onclick = close;
      document.addEventListener("keydown", (e) => { if (e.key === "Escape") close(); });

      document.getElementById("create").onclick = () => {
        const title = document.getElementById("r-title").value || "Untitled";
        const type = document.getElementById("r-type");
        const typeLabel = type.options[type.selectedIndex].text;
        const tr = document.createElement("tr");
        tr.innerHTML =
          `<td>${title}</td><td>${typeLabel}</td><td>Cam P.</td>` +
          `<td><span class="pill draft">Draft</span></td>`;
        document.getElementById("rows").prepend(tr);
        close();
        const toast = document.getElementById("toast");
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2200);
      };
    </script>
  </body>
</html>
