<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Orbit — Home</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: #f6f7fb; color: #1b2034;
      }
      .top {
        display: flex; align-items: center; gap: 12px;
        padding: 16px 32px; background: #fff; border-bottom: 1px solid #e7e9f2;
      }
      .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; }
      .brand .dot { width: 13px; height: 13px; border-radius: 4px; background: #6c63ff; }
      .spacer { flex: 1; }
      .avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg,#7a73ff,#5b54e8); color: #fff; display: grid; place-items: center; font-weight: 600; }
      .wrap { max-width: 920px; margin: 0 auto; padding: 36px 32px; }
      h1 { font-size: 26px; margin: 0 0 4px; }
      p.lead { color: #6b7390; margin: 0 0 28px; }
      .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-bottom: 26px; }
      .card { background: #fff; border: 1px solid #e7e9f2; border-radius: 16px; padding: 22px; }
      .card .k { color: #6b7390; font-size: 13px; }
      .card .v { font-size: 28px; font-weight: 700; margin-top: 6px; }
      .panel { background: #fff; border: 1px solid #e7e9f2; border-radius: 16px; padding: 24px; }
      .panel h2 { font-size: 16px; margin: 0 0 16px; }
      .item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #eef0f7; }
      .item:last-child { border-bottom: 0; }
      .item .icon { width: 34px; height: 34px; border-radius: 9px; background: #ecebff; display: grid; place-items: center; }
      .btn { padding: 10px 16px; font-size: 14px; font-weight: 600; border: 0; border-radius: 10px; background: #5b54e8; color: #fff; cursor: pointer; }
      .btn:hover { background: #4a43d6; }
    </style>
  </head>
  <body>
    <header class="top">
      <div class="brand"><span class="dot"></span> Orbit</div>
      <div class="spacer"></div>
      <button class="btn" id="invite">Invite teammate</button>
      <div class="avatar">CP</div>
    </header>

    <main class="wrap">
      <h1>Good afternoon, Cam 👋</h1>
      <p class="lead">Here's what's happening in your workspace today.</p>

      <section class="grid">
        <div class="card"><div class="k">Open tasks</div><div class="v">7</div></div>
        <div class="card"><div class="k">In review</div><div class="v">3</div></div>
        <div class="card"><div class="k">Shipped</div><div class="v">21</div></div>
      </section>

      <section class="panel">
        <h2>Recent activity</h2>
        <div class="item"><span class="icon">✅</span><div>Dana closed <b>“Fix onboarding redirect”</b></div></div>
        <div class="item"><span class="icon">💬</span><div>New comment on <b>“Q2 roadmap”</b></div></div>
        <div class="item"><span class="icon">🚀</span><div>Release <b>v2.4</b> deployed to production</div></div>
      </section>
    </main>

    <script>
      document.getElementById("invite").onclick = () => alert("Invite sent!");
    </script>
  </body>
</html>
