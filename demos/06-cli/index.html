<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lumen — Send feedback</title>
    <style>
      :root {
        --bg: #0b1020;
        --card: #141a30;
        --accent: #6c63ff;
        --accent-hi: #837dff;
        --text: #eef1ff;
        --muted: #9aa3c7;
        --line: #232a45;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: radial-gradient(120% 120% at 50% 0%, #1a2142 0%, var(--bg) 55%);
        color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        width: 460px;
        max-width: 90vw;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      }
      h1 { font-size: 28px; margin: 0 0 6px; }
      p.sub { color: var(--muted); margin: 0 0 26px; line-height: 1.5; }
      label { display: block; font-size: 13px; color: var(--muted); margin: 16px 0 8px; }
      input, select, textarea {
        width: 100%;
        padding: 13px 15px;
        font-size: 15px;
        font-family: inherit;
        color: var(--text);
        background: #0f1428;
        border: 1px solid var(--line);
        border-radius: 11px;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      textarea { min-height: 96px; resize: vertical; }
      input:focus, select:focus, textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.18);
      }
      button {
        margin-top: 22px;
        width: 100%;
        padding: 15px;
        font-size: 16px;
        font-weight: 600;
        color: #fff;
        background: var(--accent);
        border: 0;
        border-radius: 12px;
        cursor: pointer;
        transition: background 0.2s, transform 0.08s;
      }
      button:hover { background: var(--accent-hi); }
      button:active { transform: translateY(1px); }
      .done {
        display: none;
        margin-top: 22px;
        padding: 16px;
        border-radius: 12px;
        background: rgba(46, 204, 113, 0.12);
        border: 1px solid rgba(46, 204, 113, 0.35);
        color: #8ef0b8;
        font-size: 15px;
      }
      body.sent .done { display: block; }
      body.sent form { display: none; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Send us feedback</h1>
      <p class="sub">Tell us what's working and what isn't — it goes straight to the team.</p>

      <form id="feedback" onsubmit="event.preventDefault(); document.body.classList.add('sent');">
        <label for="name">Your name</label>
        <input id="name" name="name" type="text" placeholder="Jane Doe" autocomplete="off" />

        <label for="topic">Topic</label>
        <select id="topic" name="topic">
          <option value="bug">Bug report</option>
          <option value="feature">Feature request</option>
          <option value="billing">Billing</option>
          <option value="other">Something else</option>
        </select>

        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="What's on your mind?"></textarea>

        <button id="send" type="submit">Send feedback</button>
      </form>

      <div class="done">✓ Thanks — we'll be in touch shortly.</div>
    </main>
  </body>
</html>
